server.port=8081
spring.application.name=ms-users

spring.datasource.url=jdbc:mysql://localhost:3306/db_biblioteca_users?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.flyway.enabled=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

logging.level.root=INFO
logging.level.com.biblioteca.ms_users=DEBUG
logging.file.name=logs/ms-users.log
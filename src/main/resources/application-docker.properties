server.port=8081
spring.application.name=ms-users

# Apuntamos al puente de Docker usando tu puerto 3306
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/db_biblioteca_users?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.flyway.enabled=true

# Conexión al servidor Eureka dentro de la red de Docker
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

logging.level.root=INFO
logging.level.com.biblioteca.ms_users=DEBUG
logging.file.name=logs/ms-users.log